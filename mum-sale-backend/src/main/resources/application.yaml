spring:
  application:
    name: mum-sale-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
  logging:
    level:
      org.flywaydb: DEBUG

server:
  port: 8080
